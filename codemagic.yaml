# Codemagic CI/CD for CVHC HomeCare (Capacitor 8 + React + Vite).
# Modeled on the working ick-v3 config (same stack). Reuses the Codemagic
# integrations already set up on this account:
#   - iOS:     App Store Connect integration  ->  "codemagic_api_key"
#   - Android: keystore reference             ->  "keystore_reference"
#
# Prerequisites (configured in the Codemagic UI, not here):
#   iOS:     App ID com.cvhc.homecare registered (Push Notifications on),
#            App Store Connect app created (Apple ID 6785646689),
#            "codemagic_api_key" integration present.
#   Android: a keystore uploaded to Codemagic under reference
#            "keystore_reference" (reused from Ick — see note below).
#            For Play auto-publish: a Google Play service account (optional).
#
# NOTE: the release workflows are MANUAL (no `triggering:` block) on purpose.
# CVHC's `main` gets frequent web-deploy commits; we do NOT want a TestFlight /
# Play build on every push. Start these builds by hand in the Codemagic UI.
#
# The ios/ and android/ native folders are gitignored; Capacitor regenerates
# them on each build via `cap add` + `cap sync`.

workflows:
  # ============================================================
  # ANDROID DEBUG  (sideload APK — emailed)
  # ============================================================
  android-debug:
    name: CVHC Android Debug (sideload APK)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install frontend deps
        script: |
          cd frontend
          npm ci
      - name: Build web (Vite)
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor Android
        script: |
          cd frontend
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
      - name: Build debug APK
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - chippewavalleyhomecare@gmail.com
        notify:
          success: true
          failure: true

  # ============================================================
  # ANDROID RELEASE  (signed AAB -> Google Play)
  # ============================================================
  android-release:
    name: CVHC Android Release (AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        # Reuses the keystore already in your Codemagic account (the one Ick
        # uses). If you'd rather isolate CVHC with its own upload key, generate
        # a new keystore in Codemagic and replace this reference name.
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.cvhc.homecare"
      node: 22
      java: 21
    scripts:
      - name: Install frontend deps
        script: |
          cd frontend
          npm ci
      - name: Build web (Vite)
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor Android
        script: |
          cd frontend
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android
      - name: Set versionCode (auto-increment from Codemagic build number)
        script: |
          cd frontend/android/app
          # perl -i works identically on macOS (BSD) and Linux (GNU), unlike sed.
          perl -i -pe "s/versionCode .*/versionCode $BUILD_NUMBER/" build.gradle
          grep "versionCode" build.gradle
      - name: Build signed AAB
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon
    artifacts:
      - frontend/android/app/build/outputs/**/*.aab
      - frontend/android/app/build/outputs/**/mapping.txt
    # Google Play auto-publish (optional). Add a Google Play service account in
    # the Codemagic UI (Integrations -> Google Play), then uncomment:
    # publishing:
    #   google_play:
    #     credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal          # internal | alpha | beta | production
    #     submit_as_draft: true

  # ============================================================
  # iOS RELEASE  (.ipa -> TestFlight)
  # ============================================================
  ios-release:
    name: CVHC iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic_api_key   # existing integration on this account
    environment:
      # No `ios_signing:` block on purpose. Codemagic's automatic signing fails
      # for a brand-new bundle id that has no provisioning profile yet ("No
      # matching profiles found"). Instead we sign manually in the scripts via
      # `app-store-connect fetch-signing-files --create`, which creates the
      # cert/profile on first run and reuses them afterward.
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.cvhc.homecare"
        # Numeric App Store app ID (not sensitive — it's in every TestFlight /
        # App Store URL). Used to auto-increment the build number.
        APP_STORE_APP_ID: "6785646689"
      node: 22
      xcode: latest
    scripts:
      - name: Install frontend deps
        script: |
          cd frontend
          npm ci
      - name: Build web (Vite)
        script: |
          cd frontend
          npm run build
      - name: Set up Capacitor iOS native project
        script: |
          cd frontend
          # Capacitor 8 generates an SPM-based iOS project (no Podfile, no
          # .xcworkspace). cap add ios isn't idempotent — nuke + re-add clean.
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          if [ ! -d "ios/App/App.xcodeproj" ]; then
            echo "ERROR: cap add ios did not produce App.xcodeproj" >&2
            exit 1
          fi
      - name: Resolve Swift Package dependencies
        script: |
          cd frontend/ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: Set build number (auto-increment from App Store Connect)
        script: |
          cd frontend/ios/App
          if [ -n "$APP_STORE_APP_ID" ]; then
            LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
            NEW=$(($LATEST + 1))
            agvtool new-version -all $NEW
            echo "Set build number to $NEW"
          else
            echo "APP_STORE_APP_ID not set — using default build number"
          fi
      - name: Fetch + install signing files (cert + provisioning profile)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build .ipa with xcodebuild
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false   # set true when ready for App Store review
